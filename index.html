<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项应用</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'ZCOOL KuaiLe', sans-serif;
      background: radial-gradient(circle at 20% 20%, #1f2937, #020617);
    }

    .card-enter {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(10px);}
      to {opacity:1; transform: translateY(0);}
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .dragover {
      border-color: #10b981 !important;
      box-shadow: 0 0 10px #10b981;
    }

    /* small helper styles */
    #upload { min-height: 84px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap:8px; }
    .file-chip { background: rgba(255,255,255,0.06); padding:4px 8px; border-radius:8px; display:inline-flex; gap:6px; align-items:center; }
    .file-thumb { width:48px; height:48px; object-fit:cover; border-radius:6px; }
    .file-list { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; width:100%; }
    .btn-ghost { background: transparent; border: none; color: #ddd; cursor: pointer; padding:4px; }
  </style>
</head>
<body class="text-white min-h-screen">

<div class="p-6 grid md:grid-cols-3 gap-6">

  <!-- 左侧 -->
  <div class="bg-gray-900 p-6 rounded-2xl shadow-xl space-y-4">
    <h2 class="text-2xl">新增待办</h2>

    <input id="title" placeholder="标题" class="w-full p-2 rounded bg-gray-800" />
    <textarea id="desc" placeholder="描述" class="w-full p-2 rounded bg-gray-800"></textarea>

    <select id="priority" class="w-full p-2 rounded bg-gray-800">
      <option value="low">低</option>
      <option value="medium">中</option>
      <option value="high">高</option>
    </select>

    <input id="date" type="date" class="w-full p-2 rounded bg-gray-800" />

    <div id="upload" class="border-2 border-dashed p-4 text-center rounded cursor-pointer">
      <div id="uploadHint">拖拽或点击上传（支持多文件）</div>
      <div id="fileList" class="file-list"></div>
      <input id="fileInput" type="file" class="hidden" multiple />
    </div>

    <button id="addBtn" class="bg-emerald-500 w-full py-2 rounded hover:scale-105 transition">添加</button>
  </div>

  <!-- 右侧 -->
  <div class="md:col-span-2 space-y-4">

    <div class="flex gap-2">
      <button id="filterAll" class="px-3 py-1 bg-gray-700 rounded">全部</button>
      <button id="filterActive" class="px-3 py-1 bg-gray-700 rounded">进行中</button>
      <button id="filterDone" class="px-3 py-1 bg-gray-700 rounded">已完成</button>
    </div>

    <div id="list" class="grid md:grid-cols-2 gap-4"></div>
  </div>

</div>

<script>
/*
  改进点：
  - 验证标题不能为空
  - 上传区显示文件缩略/名并可移除单个文件
  - 添加后清空表单并重置上传缓冲
  - 使用 escapeHtml 保护文本避免注入
  - 事件委托处理切换/删除操作（避免在 innerHTML 中直接插入可控代码）
  - 保留图片预览和非图片文件的下载链接（Download）
*/

let todos = JSON.parse(localStorage.getItem('todos') || '[]');
let filesBuffer = [];
let currentFilter = 'all';

const upload = document.getElementById('upload');
const fileInput = document.getElementById('fileInput');
const fileListEl = document.getElementById('fileList');
const addBtn = document.getElementById('addBtn');
const list = document.getElementById('list');

// 安全转义文本，防止 XSS 注入
function escapeHtml(str = '') {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

upload.onclick = () => fileInput.click();

upload.addEventListener('dragover', e => {
  e.preventDefault();
  upload.classList.add('dragover');
});

upload.addEventListener('dragleave', () => {
  upload.classList.remove('dragover');
});

upload.addEventListener('drop', e => {
  e.preventDefault();
  upload.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', e => {
  handleFiles(e.target.files);
});

function handleFiles(fileList) {
  // fileList may be FileList or array-like
  for (let i = 0; i < fileList.length; i++) {
    const file = fileList[i];
    const reader = new FileReader();
    reader.onload = e => {
      filesBuffer.push({ name: file.name, data: e.target.result, type: file.type, size: file.size });
      refreshFileList();
    };
    reader.readAsDataURL(file);
  }
}

// 在上传区域显示缓冲文件并可逐个移除
function refreshFileList() {
  fileListEl.innerHTML = '';
  for (let i = 0; i < filesBuffer.length; i++) {
    const f = filesBuffer[i];
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    if (f.type && f.type.startsWith('image')) {
      const img = document.createElement('img');
      img.src = f.data;
      img.alt = f.name;
      img.className = 'file-thumb';
      chip.appendChild(img);
    }
    const nameSpan = document.createElement('span');
    nameSpan.style.fontSize = '12px';
    nameSpan.textContent = f.name;
    chip.appendChild(nameSpan);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'btn-ghost';
    removeBtn.title = '移除';
    removeBtn.textContent = '✖';
    removeBtn.dataset.index = i;
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = Number(e.currentTarget.dataset.index);
      filesBuffer.splice(idx, 1);
      refreshFileList();
    });

    chip.appendChild(removeBtn);
    fileListEl.appendChild(chip);
  }
  // 如果没有文件，显示提示
  if (filesBuffer.length === 0) {
    document.getElementById('uploadHint').textContent = '拖拽或点击上传（支持多文件）';
  } else {
    document.getElementById('uploadHint').textContent = `${filesBuffer.length} 个文件准备上传`;
  }
}

function save() {
  localStorage.setItem('todos', JSON.stringify(todos));
}

function resetForm() {
  document.getElementById('title').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('priority').value = 'low';
  document.getElementById('date').value = '';
  fileInput.value = null;
  filesBuffer = [];
  refreshFileList();
}

// 添加待办项（带校验）
function addTodo() {
  const titleEl = document.getElementById('title');
  const descEl = document.getElementById('desc');
  const priorityEl = document.getElementById('priority');
  const dateEl = document.getElementById('date');

  if (!titleEl.value.trim()) {
    alert('请填写标题再添加');
    titleEl.focus();
    return;
  }

  const todo = {
    id: Date.now(),
    title: titleEl.value.trim(),
    desc: descEl.value.trim(),
    priority: priorityEl.value,
    date: dateEl.value,
    done: false,
    files: filesBuffer.slice() // shallow copy
  };

  todos.unshift(todo);
  save();
  render();
  resetForm();
}

function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  save();
  render();
}

function removeTodo(id) {
  if (!confirm('确定删除该待办吗？')) return;
  todos = todos.filter(t => t.id !== id);
  save();
  render();
}

function filter(type) {
  currentFilter = type;
  render();
}

function formatDate(d) {
  if (!d) return '';
  // yyyy-mm-dd -> 更友好的显示(可改)
  return d;
}

// 渲染列表（使用委托方式处理按钮）
function render() {
  list.innerHTML = '';

  let filtered = todos.filter(t => {
    if (currentFilter === 'active') return !t.done;
    if (currentFilter === 'done') return t.done;
    return true;
  });

  for (let t of filtered) {
    const div = document.createElement('div');
    div.className = 'card-enter bg-gray-800 p-4 rounded-xl hover:-translate-y-1 hover:shadow-lg transition';

    // 顶部行：标题 + 优先级
    const top = document.createElement('div');
    top.className = 'flex justify-between';

    const h3 = document.createElement('h3');
    h3.className = 'text-lg';
    if (t.done) h3.classList.add('completed');
    h3.textContent = t.title || '(无标题)';
    top.appendChild(h3);

    const span = document.createElement('span');
    const priorityColor = {
      low: 'text-green-400',
      medium: 'text-yellow-400',
      high: 'text-red-400'
    }[t.priority] || 'text-gray-400';
    span.className = priorityColor;
    span.textContent = t.priority;
    top.appendChild(span);

    div.appendChild(top);

    // 描述
    const p = document.createElement('p');
    p.className = 'text-sm';
    if (t.done) p.classList.add('completed');
    p.textContent = t.desc || '';
    div.appendChild(p);

    // 日期
    const dateP = document.createElement('p');
    dateP.className = 'text-xs text-gray-400';
    dateP.textContent = formatDate(t.date);
    div.appendChild(dateP);

    // 操作按钮（使用 data- 属性）
    const ops = document.createElement('div');
    ops.className = 'flex gap-2 mt-2';

    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'px-2 py-1 rounded bg-gray-700';
    toggleBtn.textContent = t.done ? '恢复' : '完成';
    toggleBtn.dataset.action = 'toggle';
    toggleBtn.dataset.id = t.id;
    ops.appendChild(toggleBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'px-2 py-1 rounded bg-red-600';
    delBtn.textContent = '删除';
    delBtn.dataset.action = 'delete';
    delBtn.dataset.id = t.id;
    ops.appendChild(delBtn);

    div.appendChild(ops);

    // 文件展示区
    const filesWrap = document.createElement('div');
    filesWrap.className = 'mt-2 flex flex-wrap gap-2';
    for (let f of t.files || []) {
      if (f.type && f.type.startsWith('image')) {
        const a = document.createElement('a');
        a.href = f.data;
        a.target = '_blank';
        a.download = f.name;
        const img = document.createElement('img');
        img.src = f.data;
        img.alt = f.name;
        img.className = 'w-16 h-16 object-cover rounded';
        a.appendChild(img);
        filesWrap.appendChild(a);
      } else {
        const a = document.createElement('a');
        a.href = f.data;
        a.download = f.name;
        a.className = 'text-blue-400 text-xs';
        a.textContent = f.name;
        filesWrap.appendChild(a);
      }
    }
    div.appendChild(filesWrap);

    list.appendChild(div);
  }
}

// 事件委托：处理列表内的操作按钮
list.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = Number(btn.dataset.id);
  if (!action || !id) return;
  if (action === 'toggle') toggleTodo(id);
  if (action === 'delete') removeTodo(id);
});

// 绑定外部控件
document.getElementById('filterAll').addEventListener('click', () => filter('all'));
document.getElementById('filterActive').addEventListener('click', () => filter('active'));
document.getElementById('filterDone').addEventListener('click', () => filter('done'));
addBtn.addEventListener('click', addTodo);

// 允许回车快速添加（在标题输入时）
document.getElementById('title').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addTodo();
  }
});

// 初始渲染与文件列表刷新
refreshFileList();
render();

</script>

</body>
</html>
